<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <title>Contact | ABC Baseball</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/contact.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">

  <div class="logo">⚾ ABC Baseball</div>

  <div class="menu-toggle" id="mobile-menu">☰</div>

  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="booking.html">Book</a></li>
    <li><a href="pricing.html">Pricing</a></li>
    <li><a href="lessons.html">Lessons</a></li>
    <li><a href="gallery.html">Gallery</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>

</nav>


<!-- CONTACT SECTION -->
<section class="contact-container">

  <form class="contact-form" id="contactForm">

    <div class="input-group">
      <label>Name</label>
      <input type="text" id="name" placeholder="Your name" required>
    </div>

    <div class="input-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="Your email" required>
    </div>

    <div class="input-group">
      <label>Subject</label>
      <input type="text" id="subject" placeholder="Subject">
    </div>

    <div class="input-group full">
      <label>Message</label>
      <textarea id="message" rows="6" placeholder="Type your message..." required></textarea>
    </div>

    <button type="submit">Send Message</button>

  </form>


  <div class="contact-info">

    <h2>Get In Touch</h2>

    <p>📍 Location: Your Facility Address</p>
    <p>📞 Phone: (555) 123-4567</p>
    <p>📧 Email: info@abcbaseball.com</p>

    <div class="hours">
      <h3>Hours</h3>
      <p>Mon - Fri: 9am - 9pm</p>
      <p>Sat - Sun: 10am - 6pm</p>
    </div>

  </div>

</section>


<!-- FOOTER -->
<footer>
  <h2>ABC Baseball</h2>
  <p>We’ll respond within 24–48 hours.</p>
</footer>


<!-- SCRIPTS -->
<script src="js/script.js"></script>
<script src="js/contact.js"></script>

</body>
</html>
